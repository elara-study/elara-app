name: elara
description: "A new Flutter project."

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Local Storage
  shared_preferences:
    ^2.2.2

    # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  flutter_screenutil: ^5.9.0

  # Utils
  intl: ^0.20.2
  logger: ^2.0.2+1
  connectivity_plus: ^7.1.1
  image_picker:
  google_sign_in: ^6.2.2

  # Firebase & Notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  flutter_dotenv: ^5.2.1
  go_router: ^17.0.0
  flutter_secure_storage: ^10.3.1
  dartz: ^0.10.1
  url_launcher: ^6.3.2
  file_picker: ^8.0.0+1
  flutter_markdown: ^0.7.7+1
  path_provider: ^2.1.5

  # Voice Assistant
  record: 5.2.1
  just_audio: ^0.9.42
  permission_handler: ^11.3.0
  audio_session: ^0.1.20
  flutter_animate: ^4.5.0
 
dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner:
  injectable_generator:
  flutter_lints: ^5.0.0

dependency_overrides:
  record_linux: 1.3.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito/Nunito-Bold.ttf
          weight: 700
    - family: Comfortaa
      fonts:
        - asset: assets/fonts/Comfortaa/Comfortaa-Regular.ttf
          weight: 400
        - asset: assets/fonts/Comfortaa/Comfortaa-Medium.ttf
          weight: 500
        - asset: assets/fonts/Comfortaa/Comfortaa-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Comfortaa/Comfortaa-Bold.ttf
          weight: 700
